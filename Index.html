<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра</title>
    <style>
        body { margin: 0; background: #87CEEB url('bg.png') no-repeat center; background-size: cover; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; }
        #btn { width: 200px; height: 200px; background: orange url('btn.png') no-repeat center; background-size: contain; border-radius: 50%; border: 5px solid white; }
    </style>
</head>
<body>
    <h1 id="score">0</h1>
    <div id="btn" onclick="document.getElementById('score').innerText++"></div>
</body>
</html>
